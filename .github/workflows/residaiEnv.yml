on:
  push:
    branches:
    - dev
env:
  DOTNET_CORE_VERSION: 7.0.x
  CONTAINER_APP_NAME: realestate-ia-site.server-container-app
  CONTAINER_APP_ENVIRONMENT_NAME: residaiEnv
  RESOURCE_GROUP: residai
  CONTAINER_REGISTRY_NAME: registry20250907184441
  CONTAINER_REGISTRY_LOGIN_SERVER: registry20250907184441.azurecr.io
jobs:
  BuildAndDeployContainerApp:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.residaiEnv_SPN }}
    - name: Container App deploy
      uses: azure/container-apps-deploy-action@v1
      with:
        appSourcePath: ${{ github.workspace }}
        acrName: ${{ env.CONTAINER_REGISTRY_NAME }}
        acrUsername: ${{ secrets.registry20250907184441_USERNAME_45D1 }}
        acrPassword: ${{ secrets.registry20250907184441_PASSWORD_45D1 }}
        imageToBuild: ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}/${{ env.CONTAINER_APP_NAME }}:${{ github.sha }}
        containerAppName: ${{ env.CONTAINER_APP_NAME }}
        containerAppEnvironment: ${{ env.CONTAINER_APP_ENVIRONMENT_NAME }}
        resourceGroup: ${{ env.RESOURCE_GROUP }}
