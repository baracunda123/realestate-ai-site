# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - residai

on:
  push:
    branches:
      - dev
    paths:
      - 'realestate-ia-site.Server/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: List files in repository (debug)
        run: |
          Get-ChildItem -Recurse -Name "*.csproj"
          Get-ChildItem -Recurse -Name "*.sln"

      - name: Build with dotnet
        run: dotnet build "realestate-ia-site.Server/realestate-ia-site.Server.csproj" --configuration Release

      - name: dotnet publish
        run: dotnet publish "realestate-ia-site.Server/realestate-ia-site.Server.csproj" -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-limited
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'residai'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_0F03047280054375B2675BD33D9FD864 }}